<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Memorization Dashboard</title>
    <!-- Link to the PWA configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-light: #eff6ff;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --blank-bg: #cbd5e1;
            --radius: 12px;
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --primary-light: #1e293b;
            --blank-bg: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
            transition: background-color 0.3s ease;
            display: flex;
            justify-content: center;
        }

        .app-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .theme-toggle:hover {
            background-color: var(--border);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 850px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .panel-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        .storage-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        select {
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            max-width: 150px;
        }

        .action-btn {
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .action-btn:hover {
            background-color: var(--border);
        }
        .action-btn.danger {
            color: #ef4444;
        }
        .action-btn.danger:hover {
            background-color: #fee2e2;
        }

        .textarea-wrapper {
            position: relative;
            flex-grow: 1;
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            background-color: var(--bg);
            color: var(--text);
            transition: var(--transition);
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
            background: var(--bg);
            padding: 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            flex-grow: 1;
        }
        .btn:hover {
            color: var(--text);
            background-color: var(--border);
        }
        .btn.active {
            background-color: var(--surface);
            color: var(--primary);
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            font-weight: 600;
        }

        .peek-btn {
            background-color: var(--accent);
            color: white !important;
            border-radius: 6px;
            font-weight: 600;
        }
        .peek-btn:hover {
            background-color: var(--accent-hover);
        }

        .display-area {
            flex-grow: 1;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.2rem;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.8;
            background-color: var(--bg);
            border: 1px solid var(--border);
            min-height: 320px;
        }

        .word-blank {
            background-color: var(--blank-bg);
            color: transparent !important;
            border-radius: 4px;
            display: inline-block;
            user-select: none;
            margin: 0 1px;
            vertical-align: middle;
            line-height: 1.2;
        }
        
        .word-first-letter {
            border-bottom: 2px dashed var(--blank-bg);
            padding-bottom: 1px;
        }
        .letter-hidden {
            opacity: 0.15;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🧠 Memorization Dashboard</h1>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <span id="themeIcon">🌙</span> <span id="themeText">Dark Mode</span>
        </button>
    </header>

    <div class="dashboard">
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Source Text</div>
                <div class="storage-controls">
                    <select id="slotSelect" aria-label="Select saved text"></select>
                    <button class="action-btn" id="newSlotBtn" title="Save current as new document">💾 New</button>
                    <button class="action-btn danger" id="deleteSlotBtn" title="Delete current document">🗑️</button>
                </div>
            </div>
            <div class="textarea-wrapper">
                <textarea id="textInput" placeholder="Paste your text here..."></textarea>
            </div>
            <div class="meta-info">
                <span id="wordCount">0 words</span>
                <span id="charCount">0 characters</span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Practice Canvas</div>
            </div>
            <div class="controls">
                <button class="btn active" data-mode="full">Full Text</button>
                <button class="btn" data-mode="first">First Letters</button>
                <button class="btn" data-mode="hide25">Hide 25%</button>
                <button class="btn" data-mode="hide50">Hide 50%</button>
                <button class="btn" data-mode="hide75">Hide 75%</button>
                <button class="btn" data-mode="hide100">Hide All</button>
                <button class="btn peek-btn" id="peekBtn">Hold to Peek</button>
            </div>
            <div id="displayArea" class="display-area"></div>
        </div>
    </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const displayArea = document.getElementById('displayArea');
    const modeBtns = document.querySelectorAll('.btn[data-mode]');
    const peekBtn = document.getElementById('peekBtn');
    const themeToggle = document.getElementById('themeToggle');
    const wordCountStr = document.getElementById('wordCount');
    const charCountStr = document.getElementById('charCount');
    const slotSelect = document.getElementById('slotSelect');
    const newSlotBtn = document.getElementById('newSlotBtn');
    const deleteSlotBtn = document.getElementById('deleteSlotBtn');

    let currentMode = 'full';
    let hiddenSeed = Math.random();
    let savedSlots = {};
    let activeSlotName = "";

    const fallbackText = `To be, or not to be, that is the question:\nWhether 'tis nobler in the mind to suffer\nThe slings and arrows of outrageous fortune,\nOr to take arms against a sea of troubles,\nAnd by opposing end them.`;

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderProcessedText(text, mode) {
        if (!text.trim()) return `<span style="color: var(--text-secondary); font-style: italic;">Canvas empty. Type or paste text on the left to begin practicing!</span>`;
        if (mode === 'full') return escapeHtml(text);

        const tokens = text.split(/([a-zA-Z\u00C0-\u017F]+)/);
        
        if (mode === 'first') {
            return tokens.map((token, i) => {
                if (i % 2 === 1) {
                    return `<span class="word-first-letter">${escapeHtml(token[0])}<span class="letter-hidden">${'_'.repeat(token.length - 1)}</span></span>`;
                }
                return escapeHtml(token);
            }).join('');
        }

        if (mode.startsWith('hide')) {
            const percentMap = { 'hide25': 0.25, 'hide50': 0.50, 'hide75': 0.75, 'hide100': 1.0 };
            const percent = percentMap[mode];
            const wordIndices = [];
            tokens.forEach((token, i) => { if (i % 2 === 1) wordIndices.push(i); });
            
            const numToHide = Math.floor(wordIndices.length * percent);
            let shuffled = [...wordIndices];
            let seed = hiddenSeed;
            for (let i = shuffled.length - 1; i > 0; i--) {
                const x = Math.sin(seed++) * 10000;
                const j = Math.floor((x - Math.floor(x)) * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const indicesToHide = new Set(shuffled.slice(0, numToHide));

            return tokens.map((token, i) => {
                if (i % 2 === 1 && (indicesToHide.has(i) || percent === 1.0)) {
                    return `<span class="word-blank" style="width: ${token.length * 0.9}ch;">${'_'.repeat(token.length)}</span>`;
                }
                return escapeHtml(token);
            }).join('');
        }
    }

    function updateDisplay() {
        displayArea.innerHTML = renderProcessedText(textInput.value, currentMode);
        const text = textInput.value;
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        wordCountStr.textContent = `${words} word${words !== 1 ? 's' : ''}`;
        charCountStr.textContent = `${text.length} character${text.length !== 1 ? 's' : ''}`;
    }
    
    function loadSlotsFromStorage() {
        const stored = localStorage.getItem('memo_multi_slots');
        const active = localStorage.getItem('memo_active_slot_name');
        if (stored) { savedSlots = JSON.parse(stored); } else { savedSlots = { "Hamlet Soliloquy": fallbackText }; }
        if (active && savedSlots[active] !== undefined) { activeSlotName = active; } else { activeSlotName = Object.keys(savedSlots)[0] || ""; }
        renderSlotDropdown();
        textInput.value = savedSlots[activeSlotName] || "";
        updateDisplay();
    }

    function saveSlotsToStorage() {
        if (activeSlotName) savedSlots[activeSlotName] = textInput.value;
        localStorage.setItem('memo_multi_slots', JSON.stringify(savedSlots));
        localStorage.setItem('memo_active_slot_name', activeSlotName);
    }

    function renderSlotDropdown() {
        slotSelect.innerHTML = "";
        Object.keys(savedSlots).forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name;
            if (name === activeSlotName) opt.selected = true;
            slotSelect.appendChild(opt);
        });
    }

    textInput.addEventListener('input', () => {
        if(Math.random() > 0.85) hiddenSeed = Math.random();
        updateDisplay();
        saveSlotsToStorage();
    });

    slotSelect.addEventListener('change', (e) => {
        saveSlotsToStorage();
        activeSlotName = e.target.value;
        textInput.value = savedSlots[activeSlotName] || "";
        hiddenSeed = Math.random();
        updateDisplay();
        localStorage.setItem('memo_active_slot_name', activeSlotName);
    });

    newSlotBtn.addEventListener('click', () => {
        const name = prompt("Enter a label or title for this new text slot:");
        if (!name || name.trim() === "") return;
        const cleanName = name.trim();
        if (savedSlots[cleanName] !== undefined) { alert("A slot with that name already exists!"); return; }
        saveSlotsToStorage();
        activeSlotName = cleanName;
        savedSlots[activeSlotName] = textInput.value;
        renderSlotDropdown();
        saveSlotsToStorage();
        updateDisplay();
    });

    deleteSlotBtn.addEventListener('click', () => {
        if (Object.keys(savedSlots).length <= 1) { alert("You must keep at least one saved document slot."); return; }
        if (confirm(`Are you sure you want to permanently delete "${activeSlotName}"?`)) {
            delete savedSlots[activeSlotName];
            activeSlotName = Object.keys(savedSlots)[0];
            renderSlotDropdown();
            textInput.value = savedSlots[activeSlotName] || "";
            saveSlotsToStorage();
            hiddenSeed = Math.random();
            updateDisplay();
        }
    });

    modeBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            modeBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentMode = e.target.dataset.mode;
            hiddenSeed = Math.random(); 
            updateDisplay();
        });
    });

    const startPeek = () => { displayArea.innerHTML = escapeHtml(textInput.value); };
    const stopPeek = () => { updateDisplay(); };
    peekBtn.addEventListener('mousedown', startPeek);
    peekBtn.addEventListener('mouseup', stopPeek);
    peekBtn.addEventListener('mouseleave', stopPeek);
    peekBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startPeek(); });
    peekBtn.addEventListener('touchend', stopPeek);

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('memo_theme', theme);
        const isDark = theme === 'dark';
        document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
        document.getElementById('themeText').textContent = isDark ? 'Light Mode' : 'Dark Mode';
    }

    themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        setTheme(currentTheme === 'light' ? 'dark' : 'light');
    });

    // --- SERVICE WORKER REGISTRATION PIPELINE ---
    window.addEventListener('DOMContentLoaded', () => {
        loadSlotsFromStorage();
        const savedTheme = localStorage.getItem('memo_theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(savedTheme || (systemPrefersDark ? 'dark' : 'light'));

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("PWA Service Worker Loaded Successfully."))
                .catch(err => console.error("Service Worker failed to register:", err));
        }
    });
</script>
</body>
</html>
